name: Fuzz

# Active, coverage-guided fuzzing. The regular Test workflow already runs each
# fuzz target's seed corpus as an ordinary test on every push/PR; this workflow
# does the deeper exploration on a schedule.
on:
  schedule:
    - cron: '0 6 * * *'   # nightly, 06:00 UTC
  workflow_dispatch: {}    # manual run (also a keepalive: GitHub disables
                           # scheduled workflows after 60 days of repo inactivity)

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # `go test -fuzz` fuzzes exactly one target per invocation, so each target
      # gets its own parallel runner.
      matrix:
        target:
          - Fuzz_parseForwardedListItem
          - Fuzz_ClientIP_XFF
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      # The fuzzer caches newly-discovered inputs in $GOCACHE/fuzz, not the repo.
      # Without this, every run restarts from the seed corpus. The run_id-keyed
      # rolling cache (unique key per run + restore-keys prefix) makes runs
      # cumulative, since actions/cache entries are immutable per key.
      - name: Restore fuzz corpus
        uses: actions/cache@v5
        with:
          path: ~/.cache/go-build/fuzz
          key: fuzz-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: fuzz-${{ matrix.target }}-

      - name: Fuzz
        run: go test -run='^$' -fuzz='^${{ matrix.target }}$' -fuzztime=10m .

      # On a crash/hang the fuzzer writes the failing input to
      # testdata/fuzz/<target>/. Grab it; commit that file to the repo to turn
      # the finding into a permanent regression seed.
      - name: Upload reproducer
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-failure-${{ matrix.target }}
          path: testdata/fuzz/
          if-no-files-found: ignore
